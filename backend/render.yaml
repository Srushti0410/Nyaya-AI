services:
  - type: web
    name: nyayaai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirement.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
