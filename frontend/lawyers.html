      <div class="logo-mark">
        <svg viewBox="0 0 17 17" fill="none" stroke="#c4973f" stroke-width="1.7">
          <path d="M2 13l2.5-7.5L8.5 10l4-4.5L15 13H2z" />
          <circle cx="2.5" cy="5" r="1.4" fill="#c4973f" stroke="none" />

  </nav>
  <div class="page active" id="list-page">

      <div class="eyebrow">Our Network</div>

    </div>
    <div class="filter-row">
      <span class="filter-label">Filter by:</span>
      <div class="f-chip on" onclick="filter(this,'all')">All Areas</div>
      <div class="f-chip" onclick="filter(this,'property')">Property</div>
      <div class="f-chip" onclick="filter(this,'corporate')">Corporate</div>
      <div class="f-chip" onclick="filter(this,'family')">Family</div>
      <div class="f-chip" onclick="filter(this,'criminal')">Criminal</div>
      <div class="f-chip" onclick="filter(this,'labour')">Labour</div>
      <div class="f-chip" onclick="filter(this,'cyber')">Cyber</div>
    </div>
    <div class="grid-wrap">
      <div class="lawyers-grid" id="lawyersGrid"></div>
    </div>
  </div>
